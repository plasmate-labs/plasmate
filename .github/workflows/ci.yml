name: CI

on:
  push:
    branches: [ master ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Test
        run: cargo test

      - name: Setup Node (for CDP smoke test)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install smoke test deps
        if: ${{ matrix.os == 'ubuntu-latest' }}
        working-directory: smoke
        run: npm install

      - name: CDP smoke test (Puppeteer)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cargo build --release
          ./target/release/plasmate serve --protocol cdp --host 127.0.0.1 --port 9222 2>/dev/null &
          PID=$!
          sleep 1
          node smoke/puppeteer-smoke.mjs
          kill $PID
