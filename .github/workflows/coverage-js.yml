name: Coverage Scorecard (JS)

on:
  schedule:
    # Weekly on Sundays at 06:45 UTC
    - cron: '45 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Run coverage suite (JS enabled)
        run: |
          ./target/release/plasmate coverage \
            --urls bench/top100.txt \
            --output website/docs/coverage-js.json \
            --timeout 15000 \
            --concurrency 1 \
            --js-heap-mb 2048 \
            --max-external-scripts 3 \
            --max-external-script-kb 64 \
            --max-external-total-kb 128 \
            --external-script-timeout-ms 2000 \
            --max 100

      - name: Commit and push scorecard (if changed)
        run: |
          if git diff --quiet; then
            echo "No scorecard changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add website/docs/coverage-js.json
          git commit -m "chore: update JS coverage scorecard"
          git push
