<!DOCTYPE html>
<html lang="en">
<head>
  <title>Action Semantics</title>
  <style>
    .layout-hidden {
      DISPLAY	:
        none;
    }
  </style>
</head>
<body>
  <div role="unknown search" aria-label="Product search">
    <input type="search" aria-label="Query" name="q" />
    <button type="submit">Search</button>
  </div>
  <main>
    <h1>Preferences</h1>
    <div role="menu" aria-label="Display options">
      <div role="unknown menuitemcheckbox" aria-label="Compact mode" aria-checked="false"></div>
      <div role="unknown menuitemradio" aria-label="Annual billing" aria-checked="true"></div>
    </div>
    <div role="slider" aria-label="Seat count" aria-valuemin="1" aria-valuemax="100" aria-valuenow="25" aria-valuetext="25 seats"></div>
    <div role="spinbutton" aria-label="Approval limit" aria-valuemin="0" aria-valuemax="10" aria-valuenow="2"></div>
    <div role="option" aria-label="Enterprise plan" aria-selected="true"></div>
    <input
      aria-label="Reply"
      spellcheck="false"
      autocapitalize="sentences"
      dirname="reply.dir"
      size="42"
      autofocus
      aria-placeholder="Write a response"
    />
    <input type="not-a-real-type" aria-label="Fallback input" />
    <p class="layout-hidden">Hidden stylesheet copy</p>
    <p aria-hidden="TRUE">Hidden uppercase ARIA copy</p>
    <p style="opacity: 0">Hidden inline opacity copy</p>
    <p>Visible preferences copy</p>
  </main>
</body>
</html>
