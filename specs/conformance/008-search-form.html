<!DOCTYPE html>
<html lang="en">
<head><title>Search Page</title></head>
<body>
  <header>
    <h1>Search Engine</h1>
  </header>
  <main>
    <form action="/search" method="get" aria-label="Search">
      <input type="search" name="q" placeholder="Search the web..." required>
      <button type="submit">Search</button>
    </form>
    <h2>Popular Searches</h2>
    <ol>
      <li>Weather forecast</li>
      <li>Latest news</li>
      <li>Stock market</li>
      <li>Sports scores</li>
    </ol>
  </main>
</body>
</html>
