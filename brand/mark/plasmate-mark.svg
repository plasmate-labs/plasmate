<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Diagonal gradient: deep red-orange (bottom-left) to golden yellow-orange (top-right) -->
    <linearGradient id="pGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#D73A31"/>
      <stop offset="50%" stop-color="#F3632A"/>
      <stop offset="100%" stop-color="#FCAE1E"/>
    </linearGradient>
    <!-- Bubble gradient: simple flat with slight color variation -->
    <linearGradient id="bubGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3632A"/>
      <stop offset="100%" stop-color="#FCAE1E"/>
    </linearGradient>
  </defs>

  <!--
    P letterform based on detailed analysis:
    - Bottom-left: sharp ~90° corner (minimal radius)
    - Left edge: straight vertical
    - Top-left: large radius rounded shoulder (~25-30% of height)
    - Top edge: gentle convex curve
    - Top-right: dissolves into bubbles (no closed corner)
    - Bowl: smooth semi-elliptical curve
    - Stem bottom-right: sharp 90°
    - Inner counter: squircle-like, bottom-left interior is sharp 90°
  -->

  <!-- Outer P shape -->
  <path d="
    M 128,420
    L 128,130
    Q 128,96 162,96
    L 280,96
    Q 310,96 332,104
    Q 358,116 370,138
    Q 382,160 382,188
    L 382,210
    Q 382,242 368,262
    Q 354,280 332,290
    Q 314,296 280,296
    L 210,296
    L 210,420
    L 128,420
    Z

    M 210,162
    L 210,236
    L 268,236
    Q 296,236 310,224
    Q 320,214 320,198
    L 320,196
    Q 320,176 308,166
    Q 296,158 268,158
    L 210,162
    Z
  " fill="url(#pGrad)" fill-rule="evenodd"/>

  <!-- Dissolving bubbles from top-right, arc upward -->
  <!-- Bubble 1: largest, touching the P dissipation point -->
  <circle cx="366" cy="114" r="20" fill="url(#bubGrad)"/>
  <!-- Bubble 2: medium, above-right -->
  <circle cx="394" cy="86" r="13" fill="url(#bubGrad)" opacity="0.92"/>
  <!-- Bubble 3: small, above P shoulder -->
  <circle cx="370" cy="70" r="8" fill="#FCAE1E" opacity="0.85"/>
  <!-- Bubble 4: small, highest -->
  <circle cx="408" cy="60" r="7" fill="#FCAE1E" opacity="0.72"/>
  <!-- Bubble 5: smallest, rightmost -->
  <circle cx="420" cy="78" r="5.5" fill="#FCAE1E" opacity="0.55"/>
</svg>
