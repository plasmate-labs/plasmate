<!DOCTYPE html>
<html lang="en">
<head><title>Hidden Elements Test</title></head>
<body>
<main>
  <h1>Visible Heading</h1>
  <p>Visible paragraph</p>
  <div style="display:none">This should be hidden</div>
  <div style="visibility: hidden">This is also hidden</div>
  <div hidden>Hidden attribute</div>
  <div aria-hidden="true">Aria hidden content</div>
  <p>Another visible paragraph</p>
  <img src="/decorative.png" alt="" role="presentation">
  <img src="/important.jpg" alt="Important image">
  <noscript>Enable JavaScript</noscript>
  <template><div>Template content</div></template>
</main>
</body>
</html>
