<!DOCTYPE html>
<html lang="en">
<head>
  <title>Widget Store - Products</title>
  <style>.product{border:1px solid #ddd;padding:16px;margin:8px}</style>
  <script src="/analytics.js"></script>
</head>
<body>
<nav aria-label="Site navigation">
  <a href="/">Home</a>
  <a href="/products">Products</a>
  <a href="/cart">Cart (3)</a>
  <a href="/account">Account</a>
</nav>
<main>
  <h1>Products</h1>
  <div class="product" data-product-id="1">

    <p>$49.99</p>
    <img src="/images/widget-pro.jpg" alt="Widget Pro product photo">

    <img src="/images/widget-basic.jpg" alt="Widget Basic product photo">

      <option value="1" selected>1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>

  </div>
  <table>
    <thead>
      <tr><th>Product</th><th>Price</th><th>Rating</th></tr>
    </thead>
    <tbody>
      <tr><td>Widget Pro</td><td>$49.99</td><td>4.8/5</td></tr>
      <tr><td>Widget Basic</td><td>$19.99</td><td>4.2/5</td></tr>

<footer>
  <a href="/terms">Terms</a>
  <a href="/privacy">Privacy</a>
